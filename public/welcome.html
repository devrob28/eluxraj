<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to ELUXRAJ™</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .welcome-container {
            width: 100%;
            max-width: 480px;
        }
        
        .welcome-card {
            background: #0a0a0a;
            border: 2px solid #22c55e;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 0 80px rgba(34,197,94,0.2);
        }
        
        .success-icon {
            text-align: center;
            font-size: 4rem;
            margin-bottom: 24px;
        }
        
        .welcome-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            color: #22c55e;
        }
        
        .welcome-subtitle {
            text-align: center;
            color: #a1a1aa;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        .paid-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
            padding: 12px 20px;
            border-radius: 50px;
            margin-bottom: 32px;
            font-size: 0.9rem;
            color: #22c55e;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #d1d5db;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
        }
        .form-group input::placeholder {
            color: #6b7280;
        }
        .form-group input:disabled {
            background: rgba(34,197,94,0.1);
            border-color: rgba(34,197,94,0.3);
            color: #22c55e;
        }
        
        .create-btn {
            width: 100%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 14px;
            padding: 18px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(34,197,94,0.4);
        }
        .create-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 60px rgba(34,197,94,0.6);
        }
        .create-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-msg {
            background: rgba(220,38,38,0.15);
            border: 1px solid rgba(220,38,38,0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .error-msg.show { display: block; }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #1a1a1a;
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #71717a;
        }
        
        .invalid-session {
            text-align: center;
            padding: 40px 20px;
        }
        .invalid-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        .invalid-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f87171;
        }
        .invalid-text {
            color: #71717a;
            margin-bottom: 24px;
        }
        .retry-btn {
            display: inline-block;
            background: #22c55e;
            color: #000;
            padding: 14px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
        }
        
        #formSection { display: none; }
        #loadingSection { display: block; }
        #invalidSection { display: none; }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-card">
            
            <!-- Loading State -->
            <div id="loadingSection">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Verifying your payment...</div>
                </div>
            </div>
            
            <!-- Invalid Session -->
            <div id="invalidSection">
                <div class="invalid-session">
                    <div class="invalid-icon">⚠️</div>
                    <div class="invalid-title">Session Not Found</div>
                    <div class="invalid-text">We couldn't verify your payment. Please try again.</div>
                    <a href="/checkout.html" class="retry-btn">Try Again</a>
                </div>
            </div>
            
            <!-- Set Password Form -->
            <div id="formSection">
                <div class="success-icon">🎉</div>
                <h1 class="welcome-title">Payment Successful!</h1>
                <p class="welcome-subtitle" id="welcomeSubtitle">Set your password to activate your Pro account</p>
                
                <div class="paid-badge">
                    ✓ Pro Membership Activated
                </div>
                
                <div class="error-msg" id="errorMsg"></div>
                
                <form id="accountForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" disabled style="opacity:0.7;cursor:not-allowed;">
                    </div>
                    <div class="form-group">
                        <label>Create Password</label>
                        <input type="password" id="password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="passwordConfirm" placeholder="Re-enter password" required minlength="8" autocomplete="new-password">
                    </div>
                    
                    <input type="hidden" id="resetToken">
                    
                    <button type="submit" class="create-btn" id="createBtn">
                        ACTIVATE MY ACCOUNT →
                    </button>
                </form>
            </div>
            
        </div>
    </div>
    
    <script>
        const API = 'https://eluxraj-api-production.up.railway.app/api/v1';
        
        // Get session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');
        
        async function claimAccount() {
            if (!sessionId) {
                showInvalid();
                return;
            }
            
            try {
                const res = await fetch(API + '/stripe/claim-account/' + sessionId);
                const data = await res.json();
                
                if (!res.ok) {
                    // 404 means webhook hasn't fired yet — retry once after 2s
                    if (res.status === 404) {
                        await new Promise(r => setTimeout(r, 2500));
                        const retry = await fetch(API + '/stripe/claim-account/' + sessionId);
                        const retryData = await retry.json();
                        if (!retry.ok) {
                            throw new Error(retryData.detail || 'Account setup delayed');
                        }
                        return showForm(retryData);
                    }
                    throw new Error(data.detail || 'Verification failed');
                }
                
                showForm(data);
            } catch (err) {
                console.error(err);
                showInvalid();
            }
        }
        
        function showForm(data) {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('email').value = data.email || '';
            document.getElementById('resetToken').value = data.reset_token || '';
            if (data.full_name) {
                const subtitle = document.getElementById('welcomeSubtitle');
                if (subtitle) subtitle.textContent = `Welcome ${data.full_name.split(' ')[0]} — set your password to activate`;
            }
        }
        
        function showInvalid() {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('invalidSection').style.display = 'block';
        }
        
        // Handle password set + auto-login
        document.getElementById('accountForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('createBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const resetToken = document.getElementById('resetToken').value;
            
            if (password !== passwordConfirm) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.classList.add('show');
                return;
            }
            if (password.length < 8) {
                errorMsg.textContent = 'Password must be at least 8 characters';
                errorMsg.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'ACTIVATING...';
            errorMsg.classList.remove('show');
            
            try {
                // Set the password using the reset token
                const resetRes = await fetch(API + '/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, new_password: password })
                });
                const resetData = await resetRes.json();
                if (!resetRes.ok) {
                    throw new Error(resetData.detail || resetData.error?.message || 'Failed to set password');
                }
                
                // Auto-login
                const loginRes = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                const loginData = await loginRes.json();
                
                if (loginRes.ok && loginData.access_token) {
                    localStorage.setItem('token', loginData.access_token);
                    window.location.href = '/dashboard.html';
                } else {
                    window.location.href = '/login.html?activated=true';
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'ACTIVATE MY ACCOUNT →';
            }
        };
        
        // Kick off the claim flow
        claimAccount();
    </script>
</body>
</html>
